<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/anchor.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NavPrep 2M — 2nd Mate CoC Exam Prep</title>

    <!-- Canonical URL — tells search engines & browsers the correct address -->
    <link rel="canonical" href="https://navprep-2m.vercel.app/" />

    <!-- SEO / Social -->
    <meta name="description" content="NavPrep 2M — Complete exam preparation for DG Shipping 2nd Mate Foreign Going Certificate of Competency. Theory, oral Q&A, MCQs, formulas and more." />
    <meta name="author" content="NavPrep 2M" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (WhatsApp, Facebook previews) -->
    <meta property="og:title" content="NavPrep 2M — 2nd Mate CoC Exam Prep" />
    <meta property="og:description" content="Free exam prep for DG Shipping 2nd Mate F.G. Certificate — theory notes, oral scenarios, MCQ practice and formulas." />
    <meta property="og:url" content="https://navprep-2m.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://navprep-2m.vercel.app/logo.png" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="NavPrep 2M — 2nd Mate CoC Exam Prep" />
    <meta name="twitter:description" content="Free exam prep for DG Shipping 2nd Mate F.G. Certificate." />
    <meta name="twitter:image" content="https://navprep-2m.vercel.app/logo.png" />

    <!-- Prevent www redirect loop — JS redirect if someone loads www.* version -->
    <script>
      (function() {
        var h = window.location.hostname;
        if (h.startsWith('www.')) {
          window.location.replace(
            window.location.href.replace('://' + h, '://' + h.slice(4))
          );
        }
      })();
    </script>

    <!-- ─── Content protection: print/selection/drag/save lockdown ─── -->
    <style>
      /* Disable text selection app-wide. Inputs/textareas re-enable below. */
      html, body, #root {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;     /* iOS long-press menu */
        -webkit-tap-highlight-color: transparent;
      }
      /* Re-enable selection inside form fields so users can type/edit */
      input, textarea, select, [contenteditable="true"] {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
      /* Block image dragging entirely */
      img, video, canvas, svg {
        -webkit-user-drag: none;
        -khtml-user-drag: none;
        -moz-user-drag: none;
        -o-user-drag: none;
        user-drag: none;
        pointer-events: auto;
      }
      /* PRINT LOCKDOWN — blanks every page if someone forces print/Save-as-PDF */
      @media print {
        html, body, #root, * {
          display: none !important;
          visibility: hidden !important;
          background: #000 !important;
          color: #000 !important;
        }
        body::after {
          content: "Printing of NavPrep 2M content is not permitted. This material is licensed for personal screen use only.";
          display: block !important;
          visibility: visible !important;
          position: fixed !important;
          inset: 0 !important;
          background: #fff !important;
          color: #000 !important;
          font: 600 14pt sans-serif !important;
          padding: 24pt !important;
          text-align: center !important;
        }
      }
      /* Forensic watermark layer — set by JS at runtime with user email */
      #navprep-watermark {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2147483646;
        opacity: 0.10;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: #475569;
        background-repeat: repeat;
        mix-blend-mode: multiply;
      }
      /* Defocus blur — applied by JS when window loses focus */
      .navprep-defocus #root {
        filter: blur(20px) saturate(0.4);
        transition: filter 0.15s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
