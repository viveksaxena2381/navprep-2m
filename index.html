    <!-- Prevent www redirect loop — JS redirect if someone loads www.* version -->
    <script>
      (function() {
        var h = window.location.hostname;
        if (h.startsWith('www.')) {
          window.location.replace(
            window.location.href.replace('://' + h, '://' + h.slice(4))
          );
        }
      })();
    </script>
